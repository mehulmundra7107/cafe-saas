<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart — Café</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="stylesheet" href="/css/cart.css" />
</head>
<body>
  <header class="site-header">
    <a href="/" class="logo">← Home</a>
    <nav class="nav-links">
      <a href="/menu.html">Menu</a>
      <a href="/orders.html">Orders</a>
      <a href="/cart.html" class="active cart-badge">Cart <span style="display:none">0</span></a>
    </nav>
  </header>

  <main class="cart-page page-main">
    <h1 class="section-title" style="text-align: center;">Your Cart</h1>
    <p class="section-sub" style="text-align: center;">Table <span id="tableLabel"></span></p>

    <!-- orderStatus removed -->

    <div id="cartEmpty" class="cart-empty" style="display:none">
      <p>Your cart is empty.</p>
      <a href="/menu.html" class="btn btn-primary">Browse Menu</a>
    </div>

    <div id="cartList" class="cart-list"></div>

    <div id="cartSummary" class="cart-summary glass" style="display:none">
      <div class="cart-summary-row total">
        <span>Total</span>
        <span id="cartTotal">$0.00</span>
      </div>
    </div>

    <div id="checkoutSection" style="display:none">
      <button class="btn btn-primary" id="placeOrderBtn" style="width:100%">Confirm Order</button>
    </div>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/utils.js"></script>
  <script>
    document.getElementById("tableLabel").textContent = getTableNumber();
  </script>
  <script src="/js/cart.js"></script>
</body>
</html>
